<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pawnder - Digital Tabletop</title>
    <style>
        body { 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            background-color: #0b0b0b; /* Deep tabletop black */
            font-family: 'Georgia', serif;
            color: #e8d0a8; /* Aged gold/tan */
        }
        
        .board-container { 
            position: relative;
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }
        
        /* UI Panels styled to match the dark theme */
        #status-panel {
            width: 800px;
            background: #111; 
            padding: 15px 20px;
            border: 1px solid #e8d0a8; 
            border-radius: 4px; 
            z-index: 20;
            box-sizing: border-box; 
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        #status-panel h2 { margin: 0; font-size: 20px; letter-spacing: 2px; }
        .info-text { font-size: 14px; margin-bottom: 0; }

        /* The combined visual and interactive wrapper */
        #game-area {
            position: relative;
            width: 800px;
            height: 800px;
            transition: transform 0.6s ease-in-out; /* Smooth rotation */
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); /* Shadow to lift it off the background */
        }

        .rotate-180 {
            transform: rotate(180deg);
        }

        /* Interactive Grid Layer perfectly mapped to the scaled SVG */
        #interactive-grid {
            position: absolute; 
            /* SVG 1200x1200 scaled to 800x800. Inner grid starts at 200,200 -> 133.33px */
            top: 133.33px; 
            left: 133.33px;
            width: 533.33px; 
            height: 533.33px; 
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr); 
            z-index: 10;
        }
        
        .grid-cell {
            box-sizing: border-box;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        
        /* 3D-styled Pawns */
        .pawn {
            width: 44px; height: 44px; border-radius: 50%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.6), inset 0 -4px 4px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            position: relative;
        }
        
        /* Outer rim effect */
        .pawn::before {
            content: ''; position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px;
            border-radius: 50%; border: 1px solid rgba(255,255,255,0.2);
        }

        .pawn-white { 
            background: radial-gradient(circle at 30% 30%, #ffffff, #d4d4d4 60%, #888888); 
            border: 2px solid #555;
        }
        
        .pawn-black { 
            background: radial-gradient(circle at 30% 30%, #555555, #222222 60%, #000000); 
            border: 2px solid #111;
        }
    </style>
</head>
<body>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDtHHDrRlcnsug93x3hWF3jEx8rFA8QPcw",
            authDomain: "pawnder-59af7.firebaseapp.com",
            projectId: "pawnder-59af7",
            storageBucket: "pawnder-59af7.firebasestorage.app",
            messagingSenderId: "372213409476",
            appId: "1:372213409476:web:bc9945205d1c3fd99c8b91"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Retrieve local info
        const gameCode = localStorage.getItem("pawnderGameCode");
        const myColor = localStorage.getItem("pawnderPlayerColor"); 

        if(!gameCode || !myColor) {
            alert("No game found! Redirecting to lobby.");
            window.location.href = "index.html";
        }

        document.getElementById('display-game-code').innerText = gameCode;
        document.getElementById('display-color').innerText = myColor.toUpperCase();

        // Rotate board if player is black
        if(myColor === 'black') {
            document.getElementById('game-area').classList.add('rotate-180');
        }

        const masterDeck = [
            ...Array(2).fill({ name: 'Queen Move', action: 'move_chess', piece: 'queen' }),
            ...Array(2).fill({ name: 'King Move', action: 'move_chess', piece: 'king' }),
            ...Array(2).fill({ name: 'Knight Move', action: 'move_chess', piece: 'knight' }),
            ...Array(2).fill({ name: 'Rook Move', action: 'move_chess', piece: 'rook' }),
            ...Array(2).fill({ name: 'Bishop Move', action: 'move_chess', piece: 'bishop' }),
            ...Array(4).fill({ name: 'Remove from Field', action: 'remove_pawn', zone: 'field' }),
            ...Array(4).fill({ name: 'Remove from Safe Zone', action: 'remove_pawn', zone: 'safe' }),
            ...Array(4).fill({ name: 'Retreat', action: 'move_backwards' }),
            ...Array(4).fill({ name: 'Hop', action: 'hop_over_opponent' }),
            ...Array(4).fill({ name: 'Charge', action: 'move_forward_attack' }),
            ...Array(4).fill({ name: 'Sidestep', action: 'move_sideways_attack' }),
            ...Array(4).fill({ name: 'Block', action: 'play_to_reserve', type: 'reaction' }),
            ...Array(4).fill({ name: 'Reset Position', action: 'return_to_start' }),
            ...Array(2).fill({ name: 'Skip Turn', action: 'skip_opponent_turn' })
        ];

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex > 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        async function setupInitialGameState() {
            let initialBoard = Array(8).fill(null).map(() => Array(8).fill(null));
            for(let r = 0; r < 8; r++) {
                for(let c = 0; c < 8; c++) {
                    if(r === 0 || r === 1) initialBoard[r][c] = 'black';
                    if(r === 6 || r === 7) initialBoard[r][c] = 'white';
                }
            }

            let shuffledDeck = shuffle([...masterDeck]).map((card, index) => ({...card, id: `card_${index}`}));

            await updateDoc(doc(db, "games", gameCode), {
                boardState: JSON.stringify(initialBoard),
                deck: shuffledDeck,
                discardPile: [],
                playerWhiteHand: [],
                playerBlackHand: [],
                isInitialized: true
            });
        }

        const unsubscribe = onSnapshot(doc(db, "games", gameCode), (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.data();
                
                if(!data.isInitialized && myColor === 'white') {
                    setupInitialGameState();
                    return;
                }

                if(data.isInitialized) {
                    document.getElementById('sync-status').innerText = "Live Synced \u25CF";
                    document.getElementById('sync-status').style.color = "#4CAF50";
                    document.getElementById('display-turn').innerText = data.currentTurn.toUpperCase();
                    
                    renderBoard(JSON.parse(data.boardState));
                }
            }
        });

        function renderBoard(boardArray) {
            const grid = document.getElementById('interactive-grid');
            grid.innerHTML = ''; 

            for(let row = 0; row < 8; row++) {
                for(let col = 0; col < 8; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    
                    if(boardArray[row][col]) {
                        const pawn = document.createElement('div');
                        pawn.className = `pawn pawn-${boardArray[row][col]}`;
                        cell.appendChild(pawn);
                    }
                    grid.appendChild(cell);
                }
            }
        }
    </script>
